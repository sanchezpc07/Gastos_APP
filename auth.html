<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzly - Autenticación</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container fade-in">
        <div class="auth-header">
            <div class="logo-box" style="justify-content: center; margin-bottom: 1.5rem;">
                <img src="assets/Logo_Finanzly.png" alt="Finanzly Logo">
            </div>
            <h1 id="auth-title" style="margin-top: 0.5rem;">Iniciar Sesión</h1>
            <p id="auth-subtitle">Ingresa a tu cuenta para gestionar tus finanzas</p>
        </div>

        <form id="auth-form">
            <div class="form-group" id="name-group" style="display: none;">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <button type="button" class="btn-toggle-password" id="toggle-password-btn">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <span id="btn-text">Entrar</span>
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
            <p id="toggle-text" style="font-size: 0.875rem;">
                ¿No tienes cuenta? <a href="#" id="toggle-auth" style="color: var(--primary); text-decoration: none; font-weight: 600;">Regístrate</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
